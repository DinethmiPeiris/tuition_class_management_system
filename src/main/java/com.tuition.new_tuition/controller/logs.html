<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Logs - TMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>

<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">

        <!-- Page Header -->
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-clipboard-data"></i> Communications</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Activity Logs</h3>
                <div class="text-muted small">Track all system actions by teachers and students.</div>
            </div>
        </div>



        <!-- Logs Card -->
        <div class="fadeUpDelay1">
            <div class="card shadow-sm rounded-4 border-0 overflow-hidden">
                <div class="card-header bg-white py-3 border-bottom-0">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-clipboard-data text-primary me-2"></i>System Logs</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th class="ps-4" style="width:60px;">#</th>
                                <th>Actor</th>
                                <th>Action</th>
                                <th>Description</th>
                                <th>Time</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(logs)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <div class="mb-2"><i class="bi bi-clipboard-data fs-1 opacity-25"></i></div>
                                    <div class="fw-bold">No logs yet</div>
                                    <div class="small">Logs will appear when announcements or messages are created.</div>
                                </td>
                            </tr>
                            <tr th:each="l, stat : ${logs}">
                                <td class="ps-4 text-muted small" th:text="${stat.count}">1</td>
                                <td class="fw-bold" th:text="${l.actorRole + ' #' + l.actorId}">TEACHER #1</td>
                                <td>
                                    <span class="badge bg-primary-light text-primary rounded-pill px-3"
                                          th:text="${l.actionType}">ANNOUNCEMENT_CREATE</span>
                                </td>
                                <td class="small text-muted" th:text="${l.description}">Created announcement</td>
                                <td class="small" th:text="${#temporals.format(l.createdAt, 'yyyy-MM-dd HH:mm')}">time</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
