<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send Message - Teacher - TMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>

<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-send"></i> Communications</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Send Message</h3>
                <div class="text-muted small">Compose a new message to a registered student.</div>
            </div>
            <a th:href="@{/e5/messages/inbox}" class="btn btn-light border rounded-3 px-4 d-flex align-items-center">
                <i class="bi bi-arrow-left me-1"></i> Back to Inbox
            </a>
        </div>

        <div class="fadeUpDelay1">
            <div class="card shadow-sm rounded-4 border-0 overflow-hidden">
                <div class="card-header bg-white py-3 border-bottom-0">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-send text-primary me-2"></i>New Message</h5>
                </div>
                <div class="card-body p-4">

                    <form th:object="${message}" th:action="@{/e5/messages/send}" method="post">

                        <input type="hidden" th:field="*{receiverRole}" value="STUDENT" />

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Select Student</label>
                            <select class="form-select rounded-3" th:field="*{receiverId}">
                                <option value="">-- Select registered student --</option>
                                <option th:each="student : ${students}"
                                        th:value="${student.id}"
                                        th:text="${student.fullName + ' (' + student.username + ')'}">Student Name</option>
                            </select>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('receiverId')}"
                                 th:errors="*{receiverId}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Message</label>
                            <textarea class="form-control rounded-3" rows="6" th:field="*{content}" placeholder="Type your message here..."></textarea>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('content')}"
                                 th:errors="*{content}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary rounded-3 px-4" type="submit">
                                <i class="bi bi-send me-1"></i> Send
                            </button>
                            <a class="btn btn-light border rounded-3 px-4" th:href="@{/e5/messages/inbox}">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
