<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student - Courses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUpDelay1">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-journal-check"></i> Courses</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Enrollment Request</h3>
                <div class="text-muted">Select a course and its batch to send your request.</div>
            </div>
        </div>

        <div th:replace="~{fragments/flash :: flash}"></div>

        <div class="card shadow-sm rounded-4 fadeUp mb-4">
            <div class="card-body p-4">
                <h5 class="mb-3" style="font-weight:800;"><i class="bi bi-send-check"></i> Request Form</h5>
                <form th:action="@{/student/enroll}"
                      method="post"
                      th:object="${enrollForm}"
                      class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Course</label>
                        <select class="form-select" th:field="*{courseId}" id="courseSelect">
                            <option value="">Select Course</option>
                            <option th:each="c : ${courses}"
                                    th:value="${c.courseId}"
                                    th:text="${c.courseId + ' | ' + c.subject + ' - ' + c.grade}">
                            </option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('courseId')}"
                             th:errors="*{courseId}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Batch</label>
                        <select class="form-select" th:field="*{batchId}" id="batchSelect">
                            <option value="">Select Batch</option>
                            <option th:each="b : ${allBatches}"
                                    th:if="${#strings.equalsIgnoreCase(b.status, 'ACTIVE')}"
                                    th:value="${b.batchId}"
                                    th:attr="data-course=${b.course.courseId}"
                                    th:text="${b.batchName + ' | ' + b.year}">
                            </option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('batchId')}"
                             th:errors="*{batchId}"></div>
                    </div>

                    <div th:if="${#fields.hasGlobalErrors()}" class="col-12">
                        <div class="alert alert-danger mb-0">
                            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-end">
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-send me-1"></i> Send Request
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm rounded-4 fadeUp">
            <div class="card-body p-4">
                <h5 class="mb-3" style="font-weight:800;"><i class="bi bi-list-check"></i> Available Courses</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Course ID</th>
                            <th>Subject</th>
                            <th>Grade</th>
                            <th>Batch Year</th>
                            <th>Archived</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${courses}">
                            <td th:text="${c.courseId}">SC10</td>
                            <td th:text="${c.subject}">Science</td>
                            <td th:text="${c.grade}">Grade 10</td>
                            <td th:text="${courseYearMap[c.courseId]} ?: '-'">2026</td>
                            <td>
                                <span th:if="${c.archived}" class="badge text-bg-secondary">Yes</span>
                                <span th:if="${!c.archived}" class="badge text-bg-success">No</span>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(courses)}">
                            <td colspan="5" class="text-center text-muted py-4">
                                No courses available.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</section>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const courseSelect = document.getElementById('courseSelect');
    const batchSelect = document.getElementById('batchSelect');

    function filterBatches() {
        const selectedCourse = courseSelect.value;

        Array.from(batchSelect.options).forEach((option, index) => {
            if (index === 0) {
                option.hidden = false;
                return;
            }

            const courseId = option.getAttribute('data-course');
            option.hidden = selectedCourse && courseId !== selectedCourse;
        });

        if (batchSelect.selectedIndex > 0) {
            const selectedOption = batchSelect.options[batchSelect.selectedIndex];
            if (selectedOption.hidden) {
                batchSelect.value = "";
            }
        }
    }

    courseSelect.addEventListener('change', filterBatches);
    window.addEventListener('load', filterBatches);
</script>
</body>
</html>
