<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Student Feedback - TMS</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>

<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:70px 0;">
  <div class="container">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUpDelay1">
      <div>
        <div class="hero-badge mb-2"><i class="bi bi-chat-left-quote-fill"></i> Feedback</div>
        <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Submit Feedback</h3>
        <div class="text-muted">Help the teacher improve by sharing your experience.</div>
      </div>
      <a th:href="@{/student/dashboard}" class="btn-hero-outline">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card shadow-sm rounded-4 fadeUp">
          <div class="card-body p-4">
            <h5 class="mb-3" style="font-weight:800;">New Feedback</h5>

            <form method="post" th:action="@{/student/feedback}">
              <div class="mb-3">
                <label class="form-label">Rating</label>
                <select name="rating" class="form-select" required>
                  <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                  <option value="4">⭐⭐⭐⭐ (4)</option>
                  <option value="3">⭐⭐⭐ (3)</option>
                  <option value="2">⭐⭐ (2)</option>
                  <option value="1">⭐ (1)</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Comment</label>
                <textarea name="comment" class="form-control" rows="4" placeholder="Write something..."></textarea>
              </div>

              <div class="form-check mb-3">
                <input type="checkbox" name="anonymous" class="form-check-input" id="anon">
                <label class="form-check-label" for="anon">Submit anonymously</label>
              </div>

              <button class="btn-hero-primary w-100 justify-content-center" type="submit">
                <i class="bi bi-send-fill"></i> Submit
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card shadow-sm rounded-4 fadeUpDelay1">
          <div class="card-body p-4">
            <h5 class="mb-3" style="font-weight:800;">Your Previous Feedback</h5>

            <div th:if="${#lists.isEmpty(feedbacks)}" class="alert alert-info mb-0">
              You haven't submitted any feedback yet.
            </div>

            <div class="list-group" th:if="${!#lists.isEmpty(feedbacks)}">
              <div class="list-group-item" th:each="f : ${feedbacks}">
                <div class="d-flex justify-content-between align-items-center">
                  <div class="fw-bold" th:text="${f.rating + ' Stars'}">5 Stars</div>
                  <small class="text-muted"
                         th:text="${#temporals.format(f.createdAt,'yyyy-MM-dd HH:mm')}">
                    2026-03-03 10:00
                  </small>
                </div>
                <div class="mt-2" th:text="${f.comment}">Nice teaching!</div>
                <div class="small text-muted mt-1">
                  <span th:text="${f.anonymous ? 'Anonymous' : 'Not anonymous'}">Anonymous</span>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<div th:replace="fragments/layout :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
