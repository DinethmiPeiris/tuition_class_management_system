<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Timetable - Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0; min-height:85vh;">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-calendar-plus-fill"></i> Scheduler</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Create Timetable Session</h3>
                <div class="text-muted">Define a new physical or virtual class session.</div>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/teacher/timetable/list}" class="btn-hero-outline">
                    <i class="bi bi-arrow-left me-1"></i> Back to List
                </a>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm rounded-4 border-0 fadeUpDelay1">
                    <div class="card-body p-4 p-md-5">
                        <div th:if="${errorMessage != null}" class="alert alert-danger mb-4 rounded-4 border-0 shadow-sm">
                            <i class="bi bi-exclamation-octagon-fill me-2"></i>
                            <span th:text="${errorMessage}">Error message</span>
                        </div>

                        <form th:action="@{/timetable/create}" th:object="${timetableForm}" method="post" class="row g-4">
                            <div class="col-md-6">
                                <label for="grade" class="form-label small fw-bold text-muted text-uppercase">Academic Grade</label>
                                <select id="grade" th:field="*{grade}" class="form-select bg-light border-0 py-3">
                                    <option value="">-- Choose Grade --</option>
                                    <option value="10">Grade 10</option>
                                    <option value="11">Grade 11</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="subjectId" class="form-label small fw-bold text-muted text-uppercase">Subject Title</label>
                                <select id="subjectId" th:field="*{subjectId}" class="form-select bg-light border-0 py-3">
                                    <option value="">-- Choose Subject --</option>
                                    <option value="1">Mathematics</option>
                                    <option value="2">Science</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="batchId" class="form-label small fw-bold text-muted text-uppercase">Assigned Batch</label>
                                <select id="batchId" th:field="*{batchId}" class="form-select bg-light border-0 py-3">
                                    <option value="">-- Select Batch A/B/C --</option>
                                    <option value="1">Batch A</option>
                                    <option value="2">Batch B</option>
                                    <option value="3">Batch C</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="date" class="form-label small fw-bold text-muted text-uppercase">Session Date</label>
                                <input type="date" id="date" th:field="*{date}" class="form-control bg-light border-0 py-3">
                            </div>

                            <div class="col-md-4">
                                <label for="startTime" class="form-label small fw-bold text-muted text-uppercase">Starts At</label>
                                <input type="time" id="startTime" th:field="*{startTime}" class="form-control bg-light border-0 py-3">
                            </div>

                            <div class="col-md-4">
                                <label for="endTime" class="form-label small fw-bold text-muted text-uppercase">Ends At</label>
                                <input type="time" id="endTime" th:field="*{endTime}" class="form-control bg-light border-0 py-3">
                            </div>

                            <div class="col-12">
                                <label for="location" class="form-label small fw-bold text-muted text-uppercase">Venue / Location</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt-fill text-muted"></i></span>
                                    <input type="text" id="location" th:field="*{location}" class="form-control bg-light border-0 py-3" placeholder="Eg: Hall A, Online Zoom, etc.">
                                </div>
                            </div>

                            <div class="col-12 d-flex justify-content-end gap-2 mt-5">
                                <button type="submit" class="btn btn-primary px-5 py-3 fw-bold rounded-pill shadow-sm">
                                    <i class="bi bi-save2-fill me-2"></i> Save Session
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
