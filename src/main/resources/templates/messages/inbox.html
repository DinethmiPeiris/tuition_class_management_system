<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages Inbox - Teacher - TMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>

<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">

        <!-- Page Header -->
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-chat-dots"></i> Communications</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Message Inbox</h3>
                <div class="text-muted small">View and manage student messages.</div>
            </div>
            <a th:href="@{/e5/messages/send}" class="btn btn-primary rounded-3 px-4">
                <i class="bi bi-send me-1"></i> Send Message
            </a>
        </div>



        <!-- Messages Card -->
        <div class="fadeUpDelay1">
            <div class="card shadow-sm rounded-4 border-0 overflow-hidden">
                <div class="card-header bg-white py-3 border-bottom-0">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-chat-dots text-primary me-2"></i>Inbox</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th class="ps-4" style="width:60px;">#</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Message</th>
                                <th>Time</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(messages)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <div class="mb-2"><i class="bi bi-chat fs-1 opacity-25"></i></div>
                                    <div class="fw-bold">No messages yet</div>
                                    <div class="small">Messages will appear here once sent or received.</div>
                                </td>
                            </tr>
                            <tr th:each="m, stat : ${messages}">
                                <td class="ps-4 text-muted small" th:text="${stat.count}">1</td>
                                <td class="fw-bold text-dark" th:text="${m.senderRole == 'TEACHER' ? 'Teacher #' + m.senderId : 'Student #' + m.senderId}">TEACHER #1</td>
                                <td class="text-muted small" th:text="${m.receiverRole == 'TEACHER' ? 'Teacher #' + m.receiverId : 'Student #' + m.receiverId}">STUDENT #2</td>
                                <td class="text-truncate small" style="max-width:520px;" th:text="${m.content}">Hi</td>
                                <td class="small text-muted" th:text="${#temporals.format(m.sentAt, 'yyyy-MM-dd HH:mm')}">time</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
