<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable - Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-calendar3"></i> Timetable</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Teacher Timetable</h3>
                <div class="text-muted">Create and manage class schedules.</div>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/timetable/create}" class="btn-hero-primary">
                    <i class="bi bi-plus-circle"></i> Create Timetable
                </a>
            </div>
        </div>

        <!-- Filter Card -->
        <div class="card shadow-sm rounded-4 border-0 mb-4 fadeUpDelay1">
            <div class="card-body p-4">
                <form method="get" th:action="@{/teacher/timetable/list}" class="row g-3">
                    <div class="col-lg-3 col-md-6">
                        <label for="grade" class="form-label fw-bold small text-uppercase">Grade</label>
                        <select id="grade" name="grade" class="form-select rounded-3">
                            <option value="">Select Grade</option>
                            <option th:each="g : ${grades}" th:value="${g}" th:text="${g}"
                                    th:selected="${selectedGrade != null and selectedGrade == g}">
                            </option>
                        </select>
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label for="subject" class="form-label fw-bold small text-uppercase">Subject</label>
                        <select id="subject" name="subject" class="form-select rounded-3">
                            <option value="">Select Subject</option>
                            <option th:each="sub : ${subjects}" th:value="${sub}" th:text="${sub}"
                                    th:selected="${selectedSubject != null and selectedSubject == sub}">
                            </option>
                        </select>
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label for="batchId" class="form-label fw-bold small text-uppercase">Batch</label>
                        <select id="batchId" name="batchId" class="form-select rounded-3">
                            <option value="">Select Batch</option>
                            <option th:each="b : ${allBatches}" 
                                    th:value="${b.batchId}" 
                                    th:text="${b.batchName}"
                                    th:selected="${selectedBatchId != null and selectedBatchId == b.batchId}"
                                    th:attr="data-grade=${b.course.grade}, data-subject=${b.course.subject}">
                            </option>
                        </select>
                    </div>

                    <div class="col-lg-3 col-md-6 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100 rounded-3">
                            <i class="bi bi-search me-1"></i> Load
                        </button>
                        <a th:href="@{/teacher/timetable/list}" class="btn btn-light border w-100 rounded-3">
                            <i class="bi bi-arrow-clockwise"></i> Reset
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Timetable Card -->
        <div class="card shadow-sm rounded-4 border-0 overflow-hidden fadeUpDelay2">
            <div class="card-header bg-white py-3 border-bottom-0 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="bi bi-calendar-week text-primary me-2"></i>Schedule List</h5>
                <span class="badge bg-primary rounded-pill py-2 px-3" th:text="${totalSchedules + ' Sessions'}">0</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Grade</th>
                            <th>Subject</th>
                            <th>Batch</th>
                            <th>Date</th>
                            <th>Time Range</th>
                            <th>Location</th>
                            <th class="text-center">Online Session</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${sessions}">
                            <td class="ps-4 fw-semibold text-primary" th:text="${item.grade != null and item.grade.toString().startsWith('Grade') ? item.grade : 'Grade ' + item.grade}">Grade 10</td>
                            <td th:text="${item.subjectId != null ? subjectMap.get(item.subjectId) : '-'}">Math</td>
                            <td th:text="${item.batchId != null ? batchMap.get(item.batchId) : '-'}">Batch A</td>
                            <td th:text="${item.date != null ? #temporals.format(item.date, 'yyyy-MM-dd') : '-'}">2026-03-20</td>
                            <td>
                                <span class="badge bg-light text-dark border fw-normal"
                                      th:text="${(item.startTime != null ? #temporals.format(item.startTime, 'HH:mm') : '-') + ' - ' + (item.endTime != null ? #temporals.format(item.endTime, 'HH:mm') : '-')}">
                                    15:00 - 17:00
                                </span>
                            </td>
                            <td th:text="${item.location != null ? item.location : '-'}">Hall A</td>

                            <!-- Online Session Link Cell -->
                            <td class="text-center">
                                <!-- Batch with a link -->
                                <a th:if="${'Batch'.equalsIgnoreCase(item.classType) and item.onlineLink != null and !item.onlineLink.isBlank()}"
                                   th:href="${item.onlineLink}"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   class="btn btn-sm fw-semibold px-3 py-1 rounded-3 text-white"
                                   style="background: linear-gradient(135deg, #34a853, #4285f4); border:none; font-size:0.75rem; box-shadow:0 2px 6px rgba(66,133,244,.25); transition:opacity .2s;"
                                   onmouseover="this.style.opacity='0.82'" onmouseout="this.style.opacity='1'">
                                    <i class="bi bi-camera-video-fill me-1"></i>View Link
                                </a>
                                <!-- Batch but no link yet -->
                                <span th:if="${'Batch'.equalsIgnoreCase(item.classType) and (item.onlineLink == null or item.onlineLink.isBlank())}"
                                      class="badge rounded-pill px-3 py-2"
                                      style="background:#f1f5f9; color:#94a3b8; font-size:0.72rem; font-weight:600;">
                                    <i class="bi bi-link-45deg me-1"></i>Not set
                                </span>
                                <!-- Non-batch -->
                                <span th:if="${!'Batch'.equalsIgnoreCase(item.classType)}" class="text-muted small">&mdash;</span>
                            </td>

                             <td class="text-end pe-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/timetable/edit/{id}(id=${item.id}, returnGrade=${selectedGrade}, returnSubject=${selectedSubject}, returnBatchId=${selectedBatchId})}" class="btn btn-sm btn-outline-warning rounded-3" title="Edit Schedule">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/teacher/timetable/delete/{id}(id=${item.id})}" method="post" class="d-inline"
                                          onsubmit="return confirm('Delete this schedule?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-3" title="Delete Schedule">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${sessions == null or #lists.isEmpty(sessions)}">
                            <td colspan="8" class="text-center py-5 text-muted">No timetable records found</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const gradeSelect = document.getElementById('grade');
        const subjectSelect = document.getElementById('subject');
        const batchSelect = document.getElementById('batchId');

        if (!gradeSelect || !subjectSelect || !batchSelect) return;

        // Store all original options for filtering
        const allBatchOptions = Array.from(batchSelect.options);

        function filterBatches() {
            const selectedGrade = gradeSelect.value;
            const selectedSubject = subjectSelect.value;
            const currentBatchId = batchSelect.value;

            // Clear and filter
            batchSelect.innerHTML = '';
            
            allBatchOptions.forEach(option => {
                const batchGrade = option.getAttribute('data-grade');
                const batchSubject = option.getAttribute('data-subject');
                const isPlaceholder = option.value === "";

                // Normalizing grade check (handle "10" vs "Grade 10")
                const matchesGrade = !selectedGrade || 
                                   (batchGrade === selectedGrade) || 
                                   (("Grade " + batchGrade) === selectedGrade) ||
                                   (batchGrade && selectedGrade && batchGrade.toString() === selectedGrade.toString().replace('Grade ', '').trim());
                
                const matchesSubject = !selectedSubject || batchSubject === selectedSubject;

                if (isPlaceholder || (matchesGrade && matchesSubject)) {
                    batchSelect.appendChild(option.cloneNode(true));
                }
            });

            // Restore selection if it still exists in the filtered list
            if (currentBatchId && Array.from(batchSelect.options).some(o => o.value === currentBatchId)) {
                batchSelect.value = currentBatchId;
            }
        }

        gradeSelect.addEventListener('change', filterBatches);
        subjectSelect.addEventListener('change', filterBatches);

        // Run once on load to sync with existing filters (selected value from server)
        filterBatches();
    });
</script>
</body>
</html>
