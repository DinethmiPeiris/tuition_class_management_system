<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Exam - Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0; min-height:80vh;">
    <div class="container text-center">
        <div class="mb-5 fadeUp">
            <div class="hero-badge mb-2 mx-auto"><i class="bi bi-pencil-square"></i> Edit Exam</div>
            <h3 style="font-weight:900; letter-spacing:-.5px;">Update Exam Details</h3>
            <p class="text-muted">Modify the schedule or instructions for this assessment.</p>
        </div>

        <div class="row justify-content-center fadeUpDelay1">
            <div class="col-lg-8">
                <div class="card shadow-lg rounded-4 border-0 text-start">
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/exams/update/{id}(id=${exam.id})}" method="post" th:object="${exam}">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="row g-4">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold small text-uppercase">Exam Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi bi-journal-text text-primary"></i></span>
                                        <input type="text" th:field="*{examName}" class="form-control bg-light border-0 rounded-end-3" placeholder="e.g. Mid Term Assessment" required>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-uppercase">Subject</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi bi-book text-primary"></i></span>
                                        <input type="text" th:field="*{subject}" class="form-control bg-light border-0 rounded-end-3" placeholder="e.g. Mathematics" required>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-uppercase">Batch / Grade</label>
                                    <select th:field="*{batchName}" class="form-select bg-light border-0 rounded-3" required>
                                        <option value="Grade 10">Grade 10</option>
                                        <option value="Grade 11">Grade 11</option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Exam Date</label>
                                    <input type="date" th:field="*{examDate}" class="form-control bg-light border-0 rounded-3" required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Start Time</label>
                                    <input type="time" th:field="*{examTime}" class="form-control bg-light border-0 rounded-3" required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Duration (Hours)</label>
                                    <input type="number" th:field="*{duration}" class="form-control bg-light border-0 rounded-3" min="1" required>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label fw-bold small text-uppercase">Location / Type</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt text-primary"></i></span>
                                        <input type="text" th:field="*{location}" class="form-control bg-light border-0 rounded-end-3" placeholder="e.g. Hall A or Online">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold small text-uppercase">Instructions (Optional)</label>
                                    <textarea th:field="*{instructions}" class="form-control bg-light border-0 rounded-3" rows="3" placeholder="Add any special instructions..."></textarea>
                                </div>

                                <div class="col-12 mt-5">
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary px-5 py-3 rounded-3 fw-bold flex-grow-1 shadow-sm">
                                            <i class="bi bi-check-circle me-1"></i> Update Exam Schedule
                                        </button>
                                        <a th:href="@{/exams}" class="btn btn-light px-4 py-3 rounded-3 border fw-bold text-muted">Cancel</a>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
