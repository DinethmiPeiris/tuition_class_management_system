<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Sessions - TMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>

<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">

        <!-- Header Section -->
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4 fadeUpDelay1">
            <div>
                <div class="hero-badge mb-2">
                    <i class="bi bi-calendar-range"></i> Attendance
                </div>
                <h2 class="mb-0" style="font-weight:900; letter-spacing:-1px; font-size: 2.2rem;">My Attendance</h2>
                <div class="text-muted">Select a session to view your attendance record for that class.</div>
            </div>

            <div class="d-flex gap-2">
                <a th:if="${studentId != null}"
                   th:href="@{/student/attendance/monthly-summary(studentId=${studentId})}"
                   class="btn-hero-primary" style="background: #10b981; border-color: #10b981;">
                    <i class="bi bi-bar-chart-line me-1"></i> Monthly Summary
                </a>
            </div>
        </div>

        <!-- Filters -->
        <div class="card shadow-sm border-0 rounded-4 mb-4 fadeUpDelay2 overflow-hidden">
            <div class="card-body p-4">
                <form method="get" th:action="@{/student/attendance}" class="row g-3">
                    <input type="hidden" name="studentId" th:value="${studentId}">

                    <div class="col-lg-4 col-md-6">
                        <label class="form-label fw-bold small text-muted text-uppercase">Grade</label>
                        <select class="form-select rounded-3" disabled>
                            <option value="10" selected>10</option>
                        </select>
                        <input type="hidden" name="grade" value="10">
                    </div>

                    <div class="col-lg-4 col-md-6">
                        <label class="form-label fw-bold small text-muted text-uppercase">Subject</label>
                        <select name="subject" class="form-select rounded-3">
                            <option value="">All Subjects</option>
                            <option th:each="s : ${subjects}" th:value="${s}" th:text="${s}"
                                    th:selected="${selectedSubject != null and selectedSubject.equals(s)}">
                            </option>
                        </select>
                    </div>

                    <div class="col-lg-4 col-md-12 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary rounded-3 flex-grow-1 py-2">
                            <i class="bi bi-funnel me-1"></i> Apply Filters
                        </button>
                        <a th:href="@{/student/attendance(studentId=${studentId})}"
                           class="btn btn-light rounded-3 py-2">
                            <i class="bi bi-arrow-clockwise"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card shadow-sm border-0 rounded-4 fadeUpDelay3 overflow-hidden">
            <div class="card-header bg-white border-bottom p-4">
                <h5 class="mb-0 fw-bold"><i class="bi bi-clock-history me-2 text-primary"></i> Available Sessions</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Grade</th>
                                <th>Subject</th>
                                <th>Batch</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Location</th>
                                <th class="pe-4 text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${sessions == null or #lists.isEmpty(sessions)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <div class="fw-bold">No sessions found</div>
                                    <div class="small">Try adjusting your filters.</div>
                                </td>
                            </tr>

                            <tr th:each="item : ${sessions}">
                                <td class="ps-4 fw-bold" th:text="${'Grade ' + item.grade}">10</td>
                                <td class="fw-medium text-dark" th:text="${item.subjectId != null ? subjectMap.get(item.subjectId) : '-'}">Science</td>
                                <td th:text="${item.batchId != null ? batchMap.get(item.batchId) : '-'}">Batch A</td>
                                <td th:text="${item.date != null ? #temporals.format(item.date, 'yyyy-MM-dd') : '-'}">2026-03-20</td>
                                <td class="small" th:text="${(item.startTime != null ? #temporals.format(item.startTime, 'HH:mm') : '-') + ' - ' + (item.endTime != null ? #temporals.format(item.endTime, 'HH:mm') : '-')}">15:00 - 17:00</td>
                                <td th:text="${item.location != null ? item.location : '-'}">Hall A</td>
                                <td class="pe-4 text-end">
                                    <a th:href="@{/student/attendance/view(studentId=${studentId},sessionId=${item.id})}"
                                       class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                        <i class="bi bi-eye-fill me-1"></i> View My Attendance
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
