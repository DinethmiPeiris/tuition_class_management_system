<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Submissions - Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-clipboard-check"></i> Submissions</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">
                    <span th:text="${exam.examName}">Final Exam</span>
                </h3>
                <div class="text-muted small">
                    Subject: <span class="fw-bold text-primary" th:text="${exam.subject}">Subject</span> 
                    <span class="mx-2 text-silver px-1">|</span>
                    Batch: <span th:text="${exam.batchName}">Batch</span>
                </div>
            </div>

            <div class="d-flex gap-2">
<a th:href="@{/exams/list}" class="btn btn-light border rounded-3 px-4 d-flex align-items-center">
                    <i class="bi bi-arrow-left me-1"></i> Back to Exams
                </a>
            </div>
        </div>

        <div class="fadeUpDelay1">
            <div class="card shadow-sm rounded-4 border-0 overflow-hidden">
                <div class="card-header bg-white py-3 border-bottom-0">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-people text-primary me-2"></i>Student Submissions</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th class="ps-4" style="width:60px;">#</th>
                                <th>Student</th>
                                <th>Email</th>
                                <th>Submitted At</th>
                                <th class="text-center">Score</th>
                                <th class="text-center">Status</th>
                                <th class="text-end pe-4">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(submissions)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <div class="mb-2"><i class="bi bi-inbox fs-1 opacity-25"></i></div>
                                    No submissions found for this exam yet.
                                </td>
                            </tr>
                            <tr th:each="sub, stat : ${submissions}">
                                <td class="ps-4 text-muted small" th:text="${stat.count}">1</td>
                                <td>
                                    <div class="fw-bold text-dark" th:text="${sub.student.name}">Student Name</div>
                                </td>
                                <td class="small text-muted" th:text="${sub.student.email}">email@example.com</td>
                                <td class="small" th:text="${#temporals.format(sub.submittedAt, 'yyyy-MM-dd HH:mm')}">2026-03-18 10:55</td>
                                <td class="text-center fw-bold">
                                    <span class="text-primary" th:text="${sub.score}">0</span>
                                    <span class="mx-1 text-silver">/</span>
                                    <span class="text-muted" th:text="${sub.totalMarks}">0</span>
                                </td>
                                <td class="text-center">
                                    <span class="badge rounded-pill px-3 py-2" 
                                          th:classappend="${sub.status == 'PASS' ? 'bg-success bg-opacity-10 text-success' : (sub.status == 'FAIL' ? 'bg-danger bg-opacity-10 text-danger' : 'bg-warning bg-opacity-10 text-warning')}">
                                        <i class="bi" th:classappend="${sub.status == 'PASS' ? 'bi-check-circle-fill' : (sub.status == 'FAIL' ? 'bi-x-circle-fill' : 'bi-hourglass-split')}"></i>
                                        <span class="ms-1" th:text="${sub.status}">PENDING</span>
                                    </span>
                                </td>
                                <td class="text-end pe-4">
                                    <a class="btn btn-sm btn-primary rounded-3 px-3 py-2 fw-bold shadow-sm"
                                       th:href="@{/teacher/submissions/mark/{submissionId}(submissionId=${sub.id})}">
                                        <i class="bi bi-pencil-square me-1"></i> Mark
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
