<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcement Form - TMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>

<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">

        <!-- Page Header -->
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-pencil-square"></i> Communications</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;"
                    th:text="${announcement.id == null ? 'Add Announcement' : 'Edit Announcement'}">
                    Add Announcement
                </h3>
                <div class="text-muted small">Fill in the details below and save.</div>
            </div>
            <a th:href="@{/e5/announcements/teacher}" class="btn btn-light border rounded-3 px-4 d-flex align-items-center">
                <i class="bi bi-arrow-left me-1"></i> Back to Announcements
            </a>
        </div>

        <!-- Form Card -->
        <div class="fadeUpDelay1">
            <div class="card shadow-sm rounded-4 border-0 overflow-hidden">
                <div class="card-header bg-white py-3 border-bottom-0">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>Announcement Details</h5>
                </div>
                <div class="card-body p-4">

                    <form th:object="${announcement}"
                          th:action="${announcement.id == null} ? @{/e5/announcements/add} : @{/e5/announcements/edit/{id}(id=${announcement.id})}"
                          method="post">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Title</label>
                            <input class="form-control form-control-lg rounded-3" type="text"
                                   th:field="*{title}" placeholder="Enter announcement title" />
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Content</label>
                            <textarea class="form-control rounded-3" rows="6"
                                      th:field="*{content}" placeholder="Write the announcement content..."></textarea>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('content')}"
                                 th:errors="*{content}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Target Group</label>
                            <select class="form-select rounded-3" th:field="*{targetGroup}">
                                <option value="">-- Select Group --</option>
                                <option value="BOTH">Both Mathematics and Science Students</option>
                                <option value="MATHS">Mathematics Students</option>
                                <option value="SCIENCE">Science Students</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary rounded-3 px-4" type="submit">
                                <i class="bi bi-save me-1"></i> Save
                            </button>
                            <a class="btn btn-light border rounded-3 px-4" th:href="@{/e5/announcements/teacher}">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
