<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Question - Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0; min-height:80vh;">
    <div class="container text-center">
        <div class="mb-5 fadeUp">
            <div class="hero-badge mb-2 mx-auto">
                <i class="bi bi-pencil-square"></i>
                <span>Update Question</span>
            </div>
            <h3 style="font-weight:900; letter-spacing:-.5px;">Edit Exam Question</h3>
            <p class="text-muted small">
                Exam: <span class="fw-bold text-primary" th:text="${exam.examName}">Exam</span>
                <span class="mx-2 text-silver px-1">|</span>
                Subject: <span th:text="${exam.subject}">Subject</span>
            </p>
        </div>

        <div class="row justify-content-center fadeUpDelay1">
            <div class="col-lg-8">
                <div class="card shadow-lg rounded-4 border-0 text-start">
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/questions/update/{id}(id=${question.id})}" th:object="${question}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" name="examId" th:value="${exam.id}">

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-uppercase">Question Type</label>
                                    <select th:field="*{type}" class="form-select bg-light border-0 rounded-3" required>
                                        <option value="MCQ">Multiple Choice (MCQ)</option>
                                        <option value="ESSAY">Essay / Written</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-uppercase">Allocated Marks</label>
                                    <input type="number" th:field="*{marks}" class="form-control bg-light border-0 rounded-3" min="1" required>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold small text-uppercase">Question Text</label>
                                    <textarea th:field="*{questionText}" class="form-control bg-light border-0 rounded-3" rows="4" placeholder="Enter the question content here..." required></textarea>
                                </div>

                                <div class="col-12 mt-5">
                                    <div class="d-flex align-items-center gap-2 mb-3">
                                        <div class="bg-primary bg-opacity-10 p-2 rounded-circle">
                                            <i class="bi bi-ui-radios text-primary"></i>
                                        </div>
                                        <h6 class="mb-0 fw-bold">MCQ Options</h6>
                                        <span class="text-muted small ms-auto">(Edit as needed)</span>
                                    </div>
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <div class="input-group">
                                                <span class="input-group-text bg-white border-end-0 fw-bold text-primary">A</span>
                                                <input type="text" th:field="*{optionA}" class="form-control bg-light border-0 rounded-end-3" placeholder="Option A">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="input-group">
                                                <span class="input-group-text bg-white border-end-0 fw-bold text-primary">B</span>
                                                <input type="text" th:field="*{optionB}" class="form-control bg-light border-0 rounded-end-3" placeholder="Option B">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="input-group">
                                                <span class="input-group-text bg-white border-end-0 fw-bold text-primary">C</span>
                                                <input type="text" th:field="*{optionC}" class="form-control bg-light border-0 rounded-end-3" placeholder="Option C">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="input-group">
                                                <span class="input-group-text bg-white border-end-0 fw-bold text-primary">D</span>
                                                <input type="text" th:field="*{optionD}" class="form-control bg-light border-0 rounded-end-3" placeholder="Option D">
                                            </div>
                                        </div>
                                        <div class="col-md-12 mt-4">
                                            <label class="form-label fw-bold small text-uppercase">Correct Option</label>
                                            <select th:field="*{correctOption}" class="form-select bg-light border-0 rounded-3">
                                                <option value="">-- Select Correct Answer --</option>
                                                <option value="A">Option A</option>
                                                <option value="B">Option B</option>
                                                <option value="C">Option C</option>
                                                <option value="D">Option D</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 mt-5">
                                    <div class="d-flex gap-2 text-center">
                                        <button type="submit" class="btn btn-primary px-5 py-3 rounded-3 fw-bold flex-grow-1 shadow-sm">
                                            <i class="bi bi-check2-circle me-1"></i> Update Question
                                        </button>
                                        <a th:href="@{/questions/exam/{id}(id=${exam.id})}" class="btn btn-light px-4 py-3 rounded-3 border fw-bold text-muted">Cancel Changes</a>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
