<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Course - Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    
    <style>
        .edit-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 650px;
        }
        .form-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .form-control:disabled {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .help-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 6px;
            display: block;
        }
    </style>
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero d-flex align-items-center" style="padding:80px 0; min-height:85vh;">
    <div class="container d-flex justify-content-center fadeUp">
        <div class="edit-card">
            <div class="text-center mb-4">
                <div class="hero-badge mx-auto mb-3"><i class="bi bi-pencil-square"></i> Course Revision</div>
                <h3 style="font-weight:900; letter-spacing:-1px;">Refine Course Details</h3>
                <p class="text-muted small">Update subject nomenclature and grade leveling for the academic catalog.</p>
            </div>

            <form th:action="@{/teacher/courses/{id}/update(id=${course.courseId})}" method="post" class="row g-4">
                <div class="col-12">
                    <label class="form-label">Permanent Course ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-lock-fill text-muted"></i></span>
                        <input class="form-control border-0 py-3" type="text" th:value="${course.courseId}" disabled>
                    </div>
                    <span class="help-text"><i class="bi bi-info-circle me-1"></i> Unique identifiers are locked to maintain data integrity.</span>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Subject Name</label>
                    <input class="form-control bg-light border-0 py-3"
                           type="text"
                           name="subject"
                           th:value="${course.subject}"
                           required
                           minlength="3"
                           maxlength="40"
                           placeholder="Eg: Science">
                    <span class="help-text">Requirement: 3 - 40 characters.</span>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Grade Category</label>
                    <input class="form-control bg-light border-0 py-3"
                           type="text"
                           name="grade"
                           th:value="${course.grade}"
                           required
                           maxlength="20"
                           placeholder="Eg: Grade 10">
                    <span class="help-text">Standard format: Grade [X]</span>
                </div>

                <div class="col-12 d-flex flex-column gap-2 mt-5">
                    <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" type="submit">
                        Apply Changes
                    </button>
                    <a th:href="@{/teacher/courses}" class="btn btn-link text-muted text-decoration-none small text-center">
                        Back to course list
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
