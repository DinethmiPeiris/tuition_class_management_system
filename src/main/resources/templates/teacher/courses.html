<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Management - Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    
    <style>
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .action-btn-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .btn-action {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .btn-edit { background: rgba(67, 97, 238, 0.1); color: var(--primary); }
        .btn-edit:hover { background: var(--primary); color: white; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .btn-delete:hover { background: #ef4444; color: white; }
        .btn-archive { background: rgba(100, 116, 139, 0.1); color: #64748b; }
        .btn-archive:hover { background: #64748b; color: white; }
        .btn-unarchive { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .btn-unarchive:hover { background: #10b981; color: white; }
    </style>
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0;">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 fadeUp">
            <div>
                <div class="hero-badge mb-2"><i class="bi bi-journal-check"></i> Academic Catalog</div>
                <h3 class="mb-0" style="font-weight:900; letter-spacing:-.5px;">Course Management</h3>
                <div class="text-muted">Master list of all subjects, grades, and active course cycles.</div>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/teacher/batches}" class="btn-hero-outline">
                    <i class="bi bi-layers me-1"></i> Manage Batches
                </a>
            </div>
        </div>

        <div class="flash-wrap">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-4 border-0 shadow-sm mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-4 border-0 shadow-sm mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <!-- Create Course Section -->
        <div class="form-card shadow-sm fadeUpDelay1">
            <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle text-primary me-2"></i>Register New Course</h5>
            <form th:action="@{/teacher/courses/create}" method="post" th:object="${createForm}" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Course ID</label>
                    <input class="form-control bg-light border-0 px-3 py-2" th:field="*{courseId}" placeholder="Eg: SC10">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('courseId')}" th:errors="*{courseId}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Subject Name</label>
                    <input class="form-control bg-light border-0 px-3 py-2" th:field="*{subject}" placeholder="Eg: Science">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Grade Level</label>
                    <input class="form-control bg-light border-0 px-3 py-2" th:field="*{grade}" placeholder="Eg: Grade 10">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('grade')}" th:errors="*{grade}"></div>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold text-muted text-uppercase">Academic Year</label>
                    <input class="form-control bg-light border-0 px-3 py-2" type="number" th:field="*{year}" placeholder="2026">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></div>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button class="btn btn-primary w-100 py-2 shadow-sm" type="submit">
                        <i class="bi bi-check-lg"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- All Courses Table -->
        <div class="card shadow-sm rounded-4 border-0 overflow-hidden fadeUpDelay2">
            <div class="card-header bg-white py-3 border-bottom-0 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="bi bi-collection text-primary me-2"></i>Active & Archived Courses</h5>
                <span class="badge bg-primary rounded-pill px-3" th:text="${courses.size() + ' Total'}">0 Total</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-uppercase small fw-bold">
                            <tr>
                                <th class="ps-4">Code</th>
                                <th>Subject</th>
                                <th>Grade</th>
                                <th class="text-center">Year</th>
                                <th class="text-center">Status</th>
                                <th class="text-end pe-4">Management</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(courses)}">
                                <td colspan="6" class="text-center py-5 text-muted italic">No courses registered yet.</td>
                            </tr>
                            <tr th:each="c : ${courses}">
                                <td class="ps-4">
                                    <span class="fw-bold text-dark fw-mono" th:text="${c.courseId}">SC10</span>
                                </td>
                                <td class="fw-semibold text-dark" th:text="${c.subject}">Science</td>
                                <td th:text="${c.grade}">Grade 10</td>
                                <td class="text-center text-muted" th:text="${courseYearMap[c.courseId]}">2026</td>
                                <td class="text-center">
                                    <span th:if="${!c.archived}" class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-2">Active</span>
                                    <span th:if="${c.archived}" class="badge bg-secondary-subtle text-secondary border border-secondary-subtle rounded-pill px-2">Archived</span>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="action-btn-group">
                                        <a th:href="@{/teacher/courses/{id}/edit(id=${c.courseId})}" class="btn-action btn-edit shadow-sm" title="Edit">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>
                                        
                                        <form th:if="${!c.archived}" th:action="@{/teacher/courses/{id}/archive(id=${c.courseId})}" method="post" class="d-inline">
                                            <button type="submit" class="btn-action btn-archive shadow-sm" title="Archive">
                                                <i class="bi bi-archive-fill"></i>
                                            </button>
                                        </form>
                                        
                                        <form th:if="${c.archived}" th:action="@{/teacher/courses/{id}/unarchive(id=${c.courseId})}" method="post" class="d-inline">
                                            <button type="submit" class="btn-action btn-unarchive shadow-sm" title="Restore">
                                                <i class="bi bi-arrow-counterclockwise"></i>
                                            </button>
                                        </form>

                                        <form th:action="@{/teacher/courses/{id}/delete(id=${c.courseId})}" method="post" class="d-inline">
                                            <button type="submit" class="btn-action btn-delete shadow-sm" title="Delete" onclick="return confirm('Permanently delete this course? This action cannot be undone.');">
                                                <i class="bi bi-trash3-fill"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
