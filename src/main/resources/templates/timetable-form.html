<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${isEdit} ? 'Edit Timetable - Teacher Panel' : 'Create Timetable - Teacher Panel'">Timetable Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="hero" style="padding:60px 0; min-height:80vh;">
    <div class="container text-center">
        <div class="mb-5 fadeUp">
            <div class="hero-badge mb-2 mx-auto">
                <i th:class="${isEdit} ? 'bi bi-pencil-square' : 'bi bi-calendar-plus'"></i>
                <span th:text="${isEdit} ? 'Edit Schedule' : 'New Schedule'">New Schedule</span>
            </div>
            <h3 style="font-weight:900; letter-spacing:-.5px;" th:text="${isEdit} ? 'Update Timetable Session' : 'Create New Timetable Session'">Create New Timetable Session</h3>
            <p class="text-muted">Set the class details, time, and location for this session.</p>
        </div>

        <div th:if="${errorMessage != null}" class="row justify-content-center mb-4">
            <div class="col-lg-8">
                <div class="alert alert-danger rounded-4 border-0 shadow-sm text-start" style="background:#fee2e2; color:#b91c1c;">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    <span th:text="${errorMessage}">Error message</span>
                </div>
            </div>
        </div>

        <div class="row justify-content-center fadeUpDelay1">
            <div class="col-lg-8">
                <div class="card shadow-lg rounded-4 border-0 text-start">
                    <div class="card-body p-4 p-md-5">
                        <form th:action="${isEdit} ? @{/timetable/update} : @{/timetable/save}" th:object="${timetableForm}" method="post">
                            <input type="hidden" th:if="${isEdit}" th:field="*{id}">
                            <!-- Carry return-filter params so we redirect back to the same filtered list -->
                            <input type="hidden" th:field="*{returnGrade}">
                            <input type="hidden" th:field="*{returnSubject}">
                            <input type="hidden" th:field="*{returnBatchId}">
                            
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-uppercase">Grade / Level</label>
                                    <select th:field="*{grade}" class="form-select bg-light border-0 rounded-3" required>
                                        <option value="">Select Grade</option>
                                        <option value="10">Grade 10</option>
                                        <option value="11">Grade 11</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-uppercase">Subject</label>
                                    <select th:field="*{subjectId}" id="subjectSelect" class="form-select bg-light border-0 rounded-3" required>
                                        <option value="">Select Subject</option>
                                        <option value="1" data-name="Mathematics">Mathematics</option>
                                        <option value="2" data-name="Science">Science</option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Batch</label>
                                    <select th:field="*{batchId}" id="batchSelect" class="form-select bg-light border-0 rounded-3" required>
                                        <option value="" data-grade="" data-subject="">Select Batch</option>
                                        <option th:each="b : ${allBatches}" 
                                                th:value="${b.batchId}" 
                                                th:text="${b.batchName}"
                                                th:data-grade="${b.course != null ? b.course.grade : ''}"
                                                th:data-subject="${b.course != null ? b.course.subject : ''}">Batch</option>
                                    </select>
                                </div>

                                <!-- Student List Container (Dynamic) -->
                                <div class="col-md-12" id="studentListContainer" style="display: none;">
                                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden" style="background: linear-gradient(135deg, #f8faff 0%, #ffffff 100%); border: 1px solid #e2e8f0 !important;">
                                        <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                                            <h6 class="mb-0 fw-bold text-primary"><i class="bi bi-people-fill me-2"></i>Enrolled Students (<span id="studentCount">0</span>)</h6>
                                            <span class="badge bg-primary-subtle text-primary rounded-pill px-3">Reference Only</span>
                                        </div>
                                        <div class="card-body p-0">
                                            <div id="studentList" class="p-3" style="max-height: 200px; overflow-y: auto;">
                                                <!-- Students will be listed here -->
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Number of Members</label>
                                    <input type="number" th:field="*{maxMembers}" id="maxMembersInput" class="form-control bg-light border-0 rounded-3" placeholder="Waiting for batch..." min="0" required readonly tabindex="-1">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Class Type</label>
                                    <div class="input-group">
                                        <input type="text" id="classTypeDisplay" class="form-control bg-light border-0 rounded-3 fw-bold text-primary" placeholder="Detecting..." readonly tabindex="-1">
                                        <input type="hidden" th:field="*{classType}" id="classTypeSelect">
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Session Date</label>
                                    <input type="date" th:field="*{date}" class="form-control bg-light border-0 rounded-3" required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">Start Time</label>
                                    <input type="time" th:field="*{startTime}" class="form-control bg-light border-0 rounded-3" required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-uppercase">End Time</label>
                                    <input type="time" th:field="*{endTime}" class="form-control bg-light border-0 rounded-3" required>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label fw-bold small text-uppercase">Location</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt text-primary"></i></span>
                                        <input type="text" th:field="*{location}" id="locationInput" class="form-control bg-light border-0 rounded-end-3" placeholder="e.g. Hall A, Online" required>
                                    </div>
                                </div>

                                <!-- Online Class Link (shown only for Batch classes) -->
                                <div class="col-md-12" id="onlineLinkContainer" style="display: none;">
                                    <label class="form-label fw-bold small text-uppercase d-flex align-items-center gap-2">
                                        <span class="badge bg-success bg-opacity-10 text-success px-2 py-1 rounded-2" style="font-size:10px;"><i class="bi bi-camera-video-fill me-1"></i>Live</span>
                                        Online Class Link
                                    </label>
                                    <div class="input-group shadow-sm" style="border-radius: 12px; overflow: hidden;">
                                        <span class="input-group-text border-0" style="background: linear-gradient(135deg, #4285f4, #34a853); color:#fff;">
                                            <i class="bi bi-link-45deg fs-5"></i>
                                        </span>
                                        <input type="url"
                                               th:field="*{onlineLink}"
                                               id="onlineLinkInput"
                                               class="form-control border-0"
                                               style="background:#f0f7ff;"
                                               placeholder="e.g. https://meet.google.com/xxx-xxxx-xxx or https://zoom.us/j/..."
                                        >
                                    </div>
                                    <div class="mt-2 d-flex gap-2 flex-wrap" id="quickLinkBtns">
                                        <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill px-3"
                                                onclick="document.getElementById('onlineLinkInput').value='https://teams.microsoft.com/l/meetup-join/'; document.getElementById('onlineLinkInput').focus();">
                                            <i class="bi bi-microsoft-teams me-1"></i>MS Teams
                                        </button>
                                    </div>
                                </div>

                                <div class="col-12 mt-5">
                                    <div class="d-flex gap-2 flex-wrap">
                                        <button type="submit" class="btn btn-primary px-5 py-3 rounded-3 fw-bold flex-grow-1 shadow-sm">
                                            <i class="bi bi-check-circle me-1"></i> 
                                            <span th:text="${isEdit} ? 'Update Session' : 'Schedule Session'">Schedule Session</span>
                                        </button>
                                        <button type="reset" class="btn btn-outline-secondary px-4 py-3 rounded-3 fw-bold">
                                            <i class="bi bi-arrow-counterclockwise me-1"></i> Reset
                                        </button>
                                        <a th:href="@{/teacher/timetable/list}" class="btn btn-light px-4 py-3 rounded-3 border fw-bold text-muted">Cancel</a>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="fragments/layout :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const gradeSelect = document.querySelector('select[name="grade"]');
        const subjectSelect = document.getElementById('subjectSelect');
        const batchSelect = document.getElementById('batchSelect');
        const classTypeSelect = document.getElementById('classTypeSelect');
        const classTypeDisplay = document.getElementById('classTypeDisplay');
        const locationInput = document.getElementById('locationInput');
        const maxMembersInput = document.getElementById('maxMembersInput');

        // Store all batch options for filtering
        const allBatchOptions = Array.from(batchSelect.options);

        function filterBatches() {
            const selectedGrade = gradeSelect.value;
            const selectedSubjectOption = subjectSelect.options[subjectSelect.selectedIndex];
            const selectedSubjectName = selectedSubjectOption ? selectedSubjectOption.getAttribute('data-name') : '';

            console.log('Filtering batches for Grade:', selectedGrade, 'Subject:', selectedSubjectName);

            // Clear current options
            batchSelect.innerHTML = '';

            // Normalize grade: strip "Grade " prefix so "Grade 10" === "10"
            function normalizeGrade(g) {
                return g ? g.replace(/^Grade\s*/i, '').trim() : '';
            }

            // Filter and add matching options
            allBatchOptions.forEach(option => {
                const batchGrade = option.getAttribute('data-grade');
                const batchSubject = option.getAttribute('data-subject');

                const isPlaceholder = option.value === "";
                const matchesGrade   = !selectedGrade   || !batchGrade   || normalizeGrade(batchGrade)   === normalizeGrade(selectedGrade);
                const matchesSubject = !selectedSubjectName || !batchSubject || batchSubject.trim().toLowerCase() === selectedSubjectName.trim().toLowerCase();

                if (isPlaceholder || (matchesGrade && matchesSubject)) {
                    batchSelect.appendChild(option.cloneNode(true));
                }
            });

            // If selected value is no longer in filtered list, reset it
            const val = batchSelect.value;
            if (!Array.from(batchSelect.options).some(o => o.value === val)) {
                batchSelect.value = '';
            }
        }

        function toggleLocation() {
            const classType = classTypeSelect.value;
            const onlineLinkContainer = document.getElementById('onlineLinkContainer');
            console.log('Toggling location for:', classType);
            
            if (classType === 'Individual') {
                locationInput.disabled = true;
                locationInput.required = false;
                locationInput.value = ''; 
                locationInput.placeholder = 'N/A for Individual';
                locationInput.style.backgroundColor = '#f8f9fa';
                locationInput.style.color = '#adb5bd';
                locationInput.style.cursor = 'not-allowed';
                onlineLinkContainer.style.display = 'none';
            } else if (classType === 'Batch') {
                locationInput.disabled = true;
                locationInput.required = false;
                locationInput.value = 'Online';
                locationInput.style.backgroundColor = '#f8f9fa';
                locationInput.style.color = '#0d6efd';
                locationInput.style.cursor = 'not-allowed';
                onlineLinkContainer.style.display = 'block';
                onlineLinkContainer.style.animation = 'fadeIn .3s ease';
            } else if (classType === 'Group') {
                locationInput.disabled = false;
                locationInput.required = true;
                if (locationInput.value === 'Online' || locationInput.placeholder === 'N/A for Individual') {
                    locationInput.value = '';
                    locationInput.placeholder = 'e.g. Hall A, Online';
                }
                locationInput.style.backgroundColor = '';
                locationInput.style.color = '';
                locationInput.style.cursor = '';
                onlineLinkContainer.style.display = 'none';
            }
        }

        function autoSelectClassType() {
            const count = parseInt(maxMembersInput.value);
            if (isNaN(count) || count < 1) {
                classTypeSelect.value = '';
                classTypeDisplay.value = '';
                toggleLocation();
                return;
            }

            let type = '';
            if (count === 1) {
                type = 'Individual';
            } else if (count >= 2 && count <= 5) {
                type = 'Group';
            } else {
                type = 'Batch';
            }
            
            classTypeSelect.value = type;
            classTypeDisplay.value = type;
            toggleLocation();
        }

        async function fetchBatchStudents() {
            const batchId = batchSelect.value;
            const container = document.getElementById('studentListContainer');
            const listElement = document.getElementById('studentList');
            const countElement = document.getElementById('studentCount');

            if (!batchId) {
                container.style.display = 'none';
                listElement.innerHTML = '';
                return;
            }

            try {
                const response = await fetch(`/enrollments/batch/${batchId}/students`);
                if (!response.ok) throw new Error('Failed to fetch students');
                
                const students = await response.json();
                console.log('Fetched students:', students);

                countElement.textContent = students.length;
                
                // Automatically fill Number of Members and detect Class Type
                maxMembersInput.value = students.length;
                autoSelectClassType();
                
                if (students.length === 0) {
                    listElement.innerHTML = '<div class="text-muted small p-2"><i class="bi bi-info-circle me-1"></i>No approved students in this batch yet.</div>';
                } else {
                    listElement.innerHTML = students.map(s => `
                        <div class="d-flex align-items-center py-2 border-bottom border-light last-child-no-border">
                            <div class="avatar-sm bg-primary-subtle text-primary rounded-circle me-3 d-flex align-items-center justify-content-center" style="width:32px; height:32px; font-size:12px; font-weight:bold;">
                                ${s.fullName.charAt(0)}
                            </div>
                            <div>
                                <div class="fw-semibold small text-dark">${s.fullName}</div>
                                <div class="text-muted" style="font-size: 11px;">${s.studentCode || 'N/A'}</div>
                            </div>
                        </div>
                    `).join('');
                }
                
                container.style.display = 'block';
            } catch (error) {
                console.error('Error fetching students:', error);
                container.style.display = 'none';
                maxMembersInput.value = '';
                autoSelectClassType();
            }
        }

        maxMembersInput.addEventListener('input', autoSelectClassType);
        
        gradeSelect.addEventListener('change', () => {
            filterBatches();
            fetchBatchStudents();
        });
        subjectSelect.addEventListener('change', () => {
            filterBatches();
            fetchBatchStudents();
        });
        batchSelect.addEventListener('change', fetchBatchStudents);
        
        // Handle form reset
        const form = document.querySelector('form');
        form.addEventListener('reset', () => {
            // Need to wait for the browser to clear the fields before updating our dynamic UI
            setTimeout(() => {
                filterBatches();
                fetchBatchStudents();
                autoSelectClassType();
                // Explicitly clear location state
                locationInput.disabled = false;
                locationInput.required = true;
                locationInput.style.backgroundColor = '';
                locationInput.style.color = '';
                locationInput.style.cursor = '';
                // Hide online link
                document.getElementById('onlineLinkContainer').style.display = 'none';
                document.getElementById('onlineLinkInput').value = '';
            }, 0);
        });

        // Finalize state on load
        filterBatches();
        fetchBatchStudents();
        if (maxMembersInput.value) {
            autoSelectClassType();
        } else {
            toggleLocation();
        }
    });
</script>
</body>
</html>
